<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>OEE Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* OEE Dashboard - sleek minimal */
:root {
  --bg: #0a0a0b;
  --bg-elev: #111114;
  --bg-elev-2: #16161a;
  --border: #1f1f24;
  --border-strong: #2a2a31;
  --text: #ededf0;
  --text-dim: #8a8a93;
  --text-faint: #55555c;
  --accent: oklch(0.74 0.16 145); /* green */
  --accent-dim: oklch(0.74 0.16 145 / 0.18);
  --warn: oklch(0.74 0.16 65);
  --bad: oklch(0.66 0.18 25);
  --grid: #1a1a1f;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  font-feature-settings: 'cv11', 'ss01', 'ss03';
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
  line-height: 1.4;
  letter-spacing: -0.01em;
}

.mono { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace; }

button { background: none; border: none; color: inherit; cursor: pointer; font: inherit; }
input { background: none; border: none; color: inherit; font: inherit; outline: none; }

::selection { background: var(--accent-dim); color: var(--text); }

/* Scrollbars */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

/* Layout */
.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.topbar {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 18px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(20px);
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 600;
  letter-spacing: -0.02em;
  font-size: 15px;
}

.brand-mark {
  width: 22px; height: 22px;
  border-radius: 6px;
  background: linear-gradient(135deg, var(--accent), oklch(0.62 0.18 165));
  display: grid; place-items: center;
  color: #0a0a0b;
  font-weight: 800;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
}

.brand-sub {
  color: var(--text-faint);
  font-weight: 400;
  font-size: 12px;
  padding-left: 12px;
  margin-left: 4px;
  border-left: 1px solid var(--border-strong);
}

.topbar-spacer { flex: 1; }

.seg {
  display: flex;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 3px;
  gap: 2px;
}

.seg button {
  padding: 6px 12px;
  border-radius: 7px;
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 500;
  letter-spacing: 0.01em;
  transition: all 0.15s ease;
}

.seg button:hover { color: var(--text); }

.seg button.active {
  background: var(--bg-elev-2);
  color: var(--text);
  box-shadow: inset 0 0 0 1px var(--border-strong);
}

.search {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 7px 12px;
  width: 240px;
  transition: border-color 0.15s ease;
}
.search:focus-within { border-color: var(--border-strong); }
.search input { flex: 1; font-size: 13px; }
.search-icon { color: var(--text-faint); }

.icon-btn {
  width: 34px; height: 34px;
  display: grid; place-items: center;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-dim);
  transition: all 0.15s ease;
}
.icon-btn:hover { color: var(--text); border-color: var(--border-strong); }

/* Page header */
.page-head {
  padding: 32px 28px 20px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
}
.page-head h1 {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.03em;
}
.page-head .sub {
  color: var(--text-dim);
  margin-top: 4px;
  font-size: 13px;
}

/* KPI strip */
.kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 0 28px 24px;
}

.kpi {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  overflow: hidden;
}

.kpi-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-faint);
  font-weight: 500;
}
.kpi-value {
  font-size: 32px;
  font-weight: 600;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.kpi-value .unit { font-size: 14px; color: var(--text-dim); font-weight: 500; }
.kpi-foot {
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 6px;
}
.kpi-spark {
  position: absolute;
  right: 0; bottom: 0;
  width: 60%;
  height: 50%;
  opacity: 0.4;
  pointer-events: none;
}

.delta-up { color: var(--accent); }
.delta-down { color: var(--bad); }

/* Section */
.section-head {
  padding: 8px 28px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.section-head h2 {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  font-weight: 600;
}
.section-tools { display: flex; gap: 8px; align-items: center; }

/* Grid of person cards */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  padding: 0 28px 28px;
}

.card {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 16px 12px;
  cursor: pointer;
  transition: all 0.15s ease;
  position: relative;
  overflow: hidden;
}
.card:hover {
  border-color: var(--border-strong);
  background: var(--bg-elev-2);
  transform: translateY(-1px);
}

.card-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 11px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  color: var(--text);
  letter-spacing: 0;
  flex-shrink: 0;
}

.card-name {
  font-weight: 500;
  font-size: 14px;
  letter-spacing: -0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.card-rank {
  font-size: 10px;
  color: var(--text-faint);
  font-family: 'JetBrains Mono', monospace;
}

.card-stats {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 6px;
}
.card-oee {
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
  display: flex;
  align-items: baseline;
  gap: 3px;
}
.card-oee .unit { font-size: 12px; color: var(--text-dim); }
.card-trend {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  display: flex;
  align-items: center;
  gap: 3px;
}

.spark { width: 100%; height: 56px; display: block; }

.card-foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10px;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 6px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}

/* Bar mini */
.bar-track {
  height: 4px;
  background: var(--bg-elev-2);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 6px;
}
.bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Detail view */
.detail {
  padding: 0 28px 40px;
}

.detail-head {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 8px 28px 24px;
}

.detail-back {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px;
  color: var(--text-dim);
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  transition: all 0.15s ease;
}
.detail-back:hover { color: var(--text); border-color: var(--border-strong); }

.detail-title {
  display: flex; align-items: center; gap: 14px;
  flex: 1;
}
.detail-title .avatar { width: 44px; height: 44px; font-size: 14px; }
.detail-title h2 { font-size: 24px; font-weight: 600; letter-spacing: -0.025em; }
.detail-title .role { color: var(--text-dim); font-size: 13px; }

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 12px;
}

.panel {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
}
.panel.span-2 { grid-column: span 2; }
.panel.span-3 { grid-column: span 3; }
.panel.span-4 { grid-column: span 4; }

.panel-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.panel-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  font-weight: 600;
}

/* Big chart */
.bigchart-wrap {
  position: relative;
  width: 100%;
  height: 320px;
}

/* Tooltip */
.tip {
  position: absolute;
  pointer-events: none;
  background: var(--bg-elev-2);
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  white-space: nowrap;
  z-index: 20;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  transform: translate(-50%, calc(-100% - 8px));
}
.tip .tip-date { color: var(--text-dim); font-size: 10px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.08em; }
.tip .tip-val { color: var(--text); font-weight: 600; font-size: 14px; }

/* Heatmap */
.heatmap { display: grid; gap: 2px; }

/* Distribution */
.dist-bars { display: flex; align-items: flex-end; gap: 3px; height: 140px; }
.dist-bar {
  flex: 1;
  background: var(--accent-dim);
  border-radius: 3px 3px 0 0;
  position: relative;
  min-height: 2px;
  transition: background 0.15s ease;
}
.dist-bar:hover { background: var(--accent); }

.legend-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
}
.legend-dot { width: 8px; height: 8px; border-radius: 2px; }

.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.stat-row:last-child { border-bottom: none; }
.stat-row .label { color: var(--text-dim); }
.stat-row .val { font-variant-numeric: tabular-nums; font-weight: 500; font-family: 'JetBrains Mono', monospace; }

/* Empty state */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-faint);
}

/* List view */
.list {
  padding: 0 28px 28px;
}
.list-table {
  width: 100%;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  border-collapse: separate;
  border-spacing: 0;
}
.list-table th, .list-table td {
  text-align: left;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.list-table th {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  font-weight: 600;
  background: var(--bg-elev-2);
  cursor: pointer;
  user-select: none;
}
.list-table th:hover { color: var(--text); }
.list-table tr:last-child td { border-bottom: none; }
.list-table tbody tr { cursor: pointer; transition: background 0.1s; }
.list-table tbody tr:hover { background: var(--bg-elev-2); }

.tnum { font-variant-numeric: tabular-nums; font-family: 'JetBrains Mono', monospace; }

/* Loading */
.loading {
  position: fixed; inset: 0;
  display: grid; place-items: center;
  background: var(--bg);
  z-index: 100;
}
.loading-spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border-strong);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.fadein { animation: fadein 0.3s cubic-bezier(0.16, 1, 0.3, 1); }

@media (max-width: 1100px) {
  .kpis { grid-template-columns: repeat(2, 1fr); }
  .detail-grid { grid-template-columns: 1fr 1fr; }
  .panel.span-3, .panel.span-4 { grid-column: span 2; }
}

</style>
</head>

<script>
// Shared utilities for the OEE dashboard

window.fmt = (n, d=1) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return n.toFixed(d);
};

window.initials = (name) => {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
};

// Stable color from a name -> hue
window.hueFromName = (name) => {
  let h = 0;
  for (let i=0;i<name.length;i++) h = (h*31 + name.charCodeAt(i)) % 360;
  return h;
};

// Rolling average ignoring nulls; values are clamped to [0,100] for sanity
window.cleanVal = (v) => {
  if (v === null || v === undefined || isNaN(v)) return null;
  if (v < 0) return 0;
  if (v > 150) return 150;
  return v;
};

window.rollingAvg = (arr, window) => {
  const out = new Array(arr.length).fill(null);
  if (window <= 1) return arr.slice();
  const half = Math.floor(window/2);
  for (let i=0;i<arr.length;i++){
    let sum = 0, c = 0;
    for (let j=Math.max(0,i-half); j<=Math.min(arr.length-1, i+half); j++){
      const v = arr[j];
      if (v!==null && !isNaN(v)) { sum += v; c++; }
    }
    out[i] = c>0 ? sum/c : null;
  }
  return out;
};

window.parseDate = (s) => new Date(s + 'T00:00:00');

window.fmtDate = (s) => {
  const d = window.parseDate(s);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};

window.fmtDateShort = (s) => {
  const d = window.parseDate(s);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
};

// SVG sparkline path. data: array of (number|null), width, height, optional yMax
window.sparkPath = (data, w, h, yMax=100) => {
  if (!data.length) return '';
  const n = data.length;
  let path = '';
  let started = false;
  for (let i=0;i<n;i++){
    const v = data[i];
    if (v === null || isNaN(v)) continue;
    const x = (i / (n-1)) * w;
    const y = h - (Math.max(0, Math.min(yMax, v)) / yMax) * h;
    if (!started) { path += `M${x.toFixed(2)},${y.toFixed(2)}`; started = true; }
    else path += `L${x.toFixed(2)},${y.toFixed(2)}`;
  }
  return path;
};

// Area path
window.areaPath = (data, w, h, yMax=100) => {
  if (!data.length) return '';
  const n = data.length;
  let pts = [];
  for (let i=0;i<n;i++){
    const v = data[i];
    if (v === null || isNaN(v)) continue;
    const x = (i / (n-1)) * w;
    const y = h - (Math.max(0, Math.min(yMax, v)) / yMax) * h;
    pts.push([x,y]);
  }
  if (!pts.length) return '';
  let path = `M${pts[0][0].toFixed(2)},${h} L${pts[0][0].toFixed(2)},${pts[0][1].toFixed(2)}`;
  for (let i=1;i<pts.length;i++) path += `L${pts[i][0].toFixed(2)},${pts[i][1].toFixed(2)}`;
  path += `L${pts[pts.length-1][0].toFixed(2)},${h} Z`;
  return path;
};

// Statistics
window.stats = (arr) => {
  const vals = arr.filter(v => v!==null && !isNaN(v));
  if (!vals.length) return { mean: 0, nonZeroMean: 0, max: 0, min: 0, active: 0, total: 0, std: 0 };
  const nonZero = vals.filter(v => v > 0);
  const sum = vals.reduce((a,b)=>a+b,0);
  const mean = sum / vals.length;
  const nzSum = nonZero.reduce((a,b)=>a+b,0);
  const nzMean = nonZero.length ? nzSum / nonZero.length : 0;
  const variance = vals.reduce((a,b)=> a + (b-mean)*(b-mean), 0) / vals.length;
  return {
    mean,
    nonZeroMean: nzMean,
    max: Math.max(...vals),
    min: Math.min(...vals),
    active: nonZero.length,
    total: vals.length,
    std: Math.sqrt(variance)
  };
};

// Range filter: return start index for given range key relative to dates array
window.rangeStartIdx = (dates, range) => {
  if (range === 'all') return 0;
  const last = dates.length - 1;
  const days = { '1m': 30, '3m': 90, '6m': 180, '1y': 365 }[range] || 0;
  return Math.max(0, last - days);
};

// Aggregate to weekly (mean) ignoring nulls. Returns { weekStarts: [], values: [] }
window.aggregateWeekly = (dates, values) => {
  const weekStarts = [];
  const out = [];
  let bucket = [];
  let bucketStart = null;
  for (let i=0;i<dates.length;i++){
    const d = window.parseDate(dates[i]);
    const dow = d.getDay(); // 0 sun
    if (dow === 1 || bucketStart === null) {
      // flush previous
      if (bucket.length && bucketStart !== null){
        const vals = bucket.filter(v => v!==null && !isNaN(v));
        out.push(vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null);
        weekStarts.push(bucketStart);
      }
      bucket = [];
      bucketStart = dates[i];
    }
    bucket.push(values[i]);
  }
  if (bucket.length){
    const vals = bucket.filter(v => v!==null && !isNaN(v));
    out.push(vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null);
    weekStarts.push(bucketStart);
  }
  return { weekStarts, values: out };
};

// Aggregate to monthly
window.aggregateMonthly = (dates, values) => {
  const buckets = {}; // YYYY-MM -> []
  for (let i=0;i<dates.length;i++){
    const ym = dates[i].slice(0,7);
    if (!buckets[ym]) buckets[ym] = [];
    if (values[i] !== null) buckets[ym].push(values[i]);
  }
  const keys = Object.keys(buckets).sort();
  return keys.map(k => ({
    month: k,
    value: buckets[k].length ? buckets[k].reduce((a,b)=>a+b,0)/buckets[k].length : null,
    count: buckets[k].length
  }));
};

// Day-of-week breakdown
window.byWeekday = (dates, values) => {
  const sums = [0,0,0,0,0,0,0];
  const counts = [0,0,0,0,0,0,0];
  for (let i=0;i<dates.length;i++){
    const v = values[i];
    if (v === null || isNaN(v) || v === 0) continue;
    const dow = window.parseDate(dates[i]).getDay();
    sums[dow] += v;
    counts[dow] += 1;
  }
  return sums.map((s,i)=> counts[i] ? s/counts[i] : 0);
};

// Distribution histogram
window.histogram = (values, binCount=10, max=100) => {
  const bins = new Array(binCount).fill(0);
  const w = max / binCount;
  for (const v of values) {
    if (v === null || isNaN(v) || v <= 0) continue;
    let idx = Math.floor(v / w);
    if (idx >= binCount) idx = binCount - 1;
    if (idx < 0) idx = 0;
    bins[idx]++;
  }
  return bins;
};

</script>

<script type="text/babel" data-presets="react">
// Big interactive line chart with crosshair / hover
const { useState, useRef, useEffect, useMemo } = React;

function BigChart({ dates, values, smoothing=7, accent='oklch(0.74 0.16 145)', height=320, showAxes=true, secondary=null, secondaryLabel='Team avg' }) {
  const wrapRef = useRef(null);
  const [width, setWidth] = useState(800);
  const [hoverIdx, setHoverIdx] = useState(null);

  useEffect(() => {
    if (!wrapRef.current) return;
    const ro = new ResizeObserver((entries) => {
      for (const e of entries) setWidth(Math.max(300, e.contentRect.width));
    });
    ro.observe(wrapRef.current);
    return () => ro.disconnect();
  }, []);

  const padL = 44, padR = 18, padT = 14, padB = 28;
  const chartW = width - padL - padR;
  const chartH = height - padT - padB;

  const cleaned = useMemo(() => values.map(window.cleanVal), [values]);
  const smoothed = useMemo(() => smoothing > 1 ? window.rollingAvg(cleaned, smoothing) : cleaned, [cleaned, smoothing]);
  const secondarySmoothed = useMemo(() => secondary ? window.rollingAvg(secondary.map(window.cleanVal), smoothing) : null, [secondary, smoothing]);

  const yMax = 100;
  const xFor = (i) => (cleaned.length<2 ? 0 : (i / (cleaned.length-1)) * chartW);
  const yFor = (v) => chartH - (Math.max(0, Math.min(yMax, v)) / yMax) * chartH;

  // Build lines
  const linePath = useMemo(() => {
    let path = ''; let started = false;
    for (let i=0;i<smoothed.length;i++){
      const v = smoothed[i];
      if (v === null) continue;
      const x = xFor(i), y = yFor(v);
      path += (started ? 'L' : 'M') + x.toFixed(2) + ',' + y.toFixed(2);
      started = true;
    }
    return path;
  }, [smoothed, chartW, chartH]);

  const areaPath = useMemo(() => {
    const pts = [];
    for (let i=0;i<smoothed.length;i++){
      const v = smoothed[i];
      if (v === null) continue;
      pts.push([xFor(i), yFor(v)]);
    }
    if (!pts.length) return '';
    let p = `M${pts[0][0]},${chartH} L${pts[0][0]},${pts[0][1]}`;
    for (let i=1;i<pts.length;i++) p += `L${pts[i][0]},${pts[i][1]}`;
    p += `L${pts[pts.length-1][0]},${chartH} Z`;
    return p;
  }, [smoothed, chartW, chartH]);

  const secondaryPath = useMemo(() => {
    if (!secondarySmoothed) return '';
    let path = ''; let started = false;
    for (let i=0;i<secondarySmoothed.length;i++){
      const v = secondarySmoothed[i];
      if (v === null) continue;
      const x = xFor(i), y = yFor(v);
      path += (started ? 'L' : 'M') + x.toFixed(2) + ',' + y.toFixed(2);
      started = true;
    }
    return path;
  }, [secondarySmoothed, chartW, chartH]);

  // Y axis ticks
  const yTicks = [0, 25, 50, 75, 100];

  // X axis ticks - month boundaries
  const xTicks = useMemo(() => {
    const seen = new Set();
    const out = [];
    for (let i=0;i<dates.length;i++){
      const d = window.parseDate(dates[i]);
      const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (!seen.has(ym) && d.getDate() <= 7){
        seen.add(ym);
        out.push({ idx: i, label: d.toLocaleDateString('en-US', { month: 'short' }), year: d.getFullYear() });
      }
    }
    // Reduce density if too many
    const max = Math.floor(chartW / 60);
    if (out.length > max) {
      const step = Math.ceil(out.length / max);
      return out.filter((_,i)=> i % step === 0);
    }
    return out;
  }, [dates, chartW]);

  const handleMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = e.clientX - rect.left - padL;
    if (x < 0 || x > chartW) { setHoverIdx(null); return; }
    const idx = Math.round((x / chartW) * (cleaned.length-1));
    setHoverIdx(idx);
  };
  const handleLeave = () => setHoverIdx(null);

  const hoverV = hoverIdx !== null ? smoothed[hoverIdx] : null;
  const hoverRaw = hoverIdx !== null ? cleaned[hoverIdx] : null;

  return (
    <div ref={wrapRef} className="bigchart-wrap" style={{height}}>
      <svg width={width} height={height} onMouseMove={handleMove} onMouseLeave={handleLeave} style={{display:'block'}}>
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={accent} stopOpacity="0.25"/>
            <stop offset="100%" stopColor={accent} stopOpacity="0"/>
          </linearGradient>
        </defs>
        <g transform={`translate(${padL},${padT})`}>
          {/* Grid */}
          {yTicks.map(t => (
            <g key={t}>
              <line x1="0" x2={chartW} y1={yFor(t)} y2={yFor(t)} stroke="var(--grid)" strokeDasharray={t===0 ? '' : '2 4'} />
              {showAxes && <text x="-10" y={yFor(t)+4} fill="var(--text-faint)" fontSize="10" textAnchor="end" fontFamily="JetBrains Mono">{t}</text>}
            </g>
          ))}
          {/* X ticks */}
          {showAxes && xTicks.map((t, i) => (
            <g key={i}>
              <line x1={xFor(t.idx)} x2={xFor(t.idx)} y1={chartH} y2={chartH+4} stroke="var(--border-strong)" />
              <text x={xFor(t.idx)} y={chartH+18} fill="var(--text-faint)" fontSize="10" textAnchor="middle" fontFamily="JetBrains Mono">
                {t.label}
                {i===0 || xTicks[i-1].year !== t.year ? ` ${String(t.year).slice(2)}` : ''}
              </text>
            </g>
          ))}
          {/* Area */}
          <path d={areaPath} fill="url(#areaGrad)" />
          {/* Secondary line (team avg) */}
          {secondaryPath && (
            <path d={secondaryPath} fill="none" stroke="var(--text-faint)" strokeWidth="1" strokeDasharray="3 3" opacity="0.7"/>
          )}
          {/* Main line */}
          <path d={linePath} fill="none" stroke={accent} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>

          {/* Crosshair */}
          {hoverIdx !== null && hoverV !== null && (
            <g style={{pointerEvents:'none'}}>
              <line x1={xFor(hoverIdx)} x2={xFor(hoverIdx)} y1={0} y2={chartH} stroke="var(--text-faint)" strokeDasharray="2 3" opacity="0.6"/>
              <circle cx={xFor(hoverIdx)} cy={yFor(hoverV)} r="4" fill={accent} stroke="var(--bg)" strokeWidth="2"/>
            </g>
          )}
        </g>
      </svg>

      {/* Tooltip */}
      {hoverIdx !== null && hoverV !== null && (
        <div className="tip" style={{
          left: padL + xFor(hoverIdx),
          top: padT + yFor(hoverV)
        }}>
          <div className="tip-date">{window.fmtDate(dates[hoverIdx])}</div>
          <div className="tip-val">{window.fmt(hoverV)}<span style={{color:'var(--text-dim)', fontSize:11, marginLeft:3}}>%</span></div>
          {hoverRaw !== null && smoothing > 1 && (
            <div style={{color:'var(--text-faint)', fontSize:10, marginTop:2}}>
              Raw {window.fmt(hoverRaw)}% • {smoothing}d avg
            </div>
          )}
        </div>
      )}

      {secondaryPath && (
        <div style={{position:'absolute', top:8, right:12, display:'flex', gap:14, fontSize:11}}>
          <div className="legend-item"><span className="legend-dot" style={{background:accent}}/>This person</div>
          <div className="legend-item"><span className="legend-dot" style={{background:'var(--text-faint)'}}/>{secondaryLabel}</div>
        </div>
      )}
    </div>
  );
}

window.BigChart = BigChart;

</script>

<script type="text/babel" data-presets="react">
// Person sparkline card
const { useMemo: useMemoP } = React;

function PersonCard({ name, dates, values, totalSeries, rank, onOpen, range='all' }) {
  const startIdx = window.rangeStartIdx(dates, range);
  const slicedValues = values.slice(startIdx);
  const slicedDates = dates.slice(startIdx);

  const cleaned = useMemoP(() => slicedValues.map(window.cleanVal), [slicedValues]);
  const smoothed = useMemoP(() => window.rollingAvg(cleaned, 14), [cleaned]);
  const stats = useMemoP(() => window.stats(cleaned), [cleaned]);

  // Trend: compare last 30 days vs prior 30 days
  const trend = useMemoP(() => {
    const n = cleaned.length;
    if (n < 60) return null;
    const recentVals = cleaned.slice(n-30).filter(v => v!==null && v>0);
    const priorVals = cleaned.slice(n-60, n-30).filter(v => v!==null && v>0);
    if (!recentVals.length || !priorVals.length) return null;
    const r = recentVals.reduce((a,b)=>a+b,0)/recentVals.length;
    const p = priorVals.reduce((a,b)=>a+b,0)/priorVals.length;
    return r - p;
  }, [cleaned]);

  const sparkW = 240, sparkH = 56;
  const linePath = useMemoP(() => window.sparkPath(smoothed, sparkW, sparkH, 100), [smoothed]);
  const areaPath = useMemoP(() => window.areaPath(smoothed, sparkW, sparkH, 100), [smoothed]);

  // Last day with data
  const lastVal = useMemoP(() => {
    for (let i=cleaned.length-1; i>=0; i--) if (cleaned[i] !== null && cleaned[i] > 0) return { v: cleaned[i], idx: i };
    return null;
  }, [cleaned]);

  // Active rate
  const activeRate = stats.total ? (stats.active / stats.total) * 100 : 0;

  return (
    <div className="card fadein" onClick={() => onOpen(name)}>
      <div className="card-head">
        <div className="avatar">{window.initials(name)}</div>
        <div className="card-name">{name}</div>
        {rank !== undefined && <div className="card-rank">#{rank}</div>}
      </div>
      <div className="card-stats">
        <div className="card-oee">
          {window.fmt(stats.nonZeroMean, 1)}<span className="unit">%</span>
        </div>
        {trend !== null && (
          <div className="card-trend" style={{color: trend>=0 ? 'var(--accent)' : 'var(--bad)'}}>
            {trend >= 0 ? '▲' : '▼'} {window.fmt(Math.abs(trend), 1)}
          </div>
        )}
      </div>
      <svg className="spark" viewBox={`0 0 ${sparkW} ${sparkH}`} preserveAspectRatio="none">
        <defs>
          <linearGradient id={`g-${name.replace(/\W/g,'')}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.3"/>
            <stop offset="100%" stopColor="var(--accent)" stopOpacity="0"/>
          </linearGradient>
        </defs>
        <line x1="0" x2={sparkW} y1={sparkH - (50/100)*sparkH} y2={sparkH - (50/100)*sparkH} stroke="var(--grid)" strokeDasharray="2 3"/>
        <path d={areaPath} fill={`url(#g-${name.replace(/\W/g,'')})`} />
        <path d={linePath} fill="none" stroke="var(--accent)" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
      <div className="card-foot">
        <span>Active {window.fmt(activeRate, 0)}%</span>
        <span>Peak {window.fmt(stats.max, 0)}</span>
      </div>
    </div>
  );
}

window.PersonCard = PersonCard;

</script>

<script type="text/babel" data-presets="react">
// Main App
const { useState: useStateA, useEffect: useEffectA, useMemo: useMemoA } = React;

function App() {
  const [data, setData] = useStateA(null);
  const [view, setView] = useStateA('overview'); // overview | list | detail
  const [selected, setSelected] = useStateA(null);
  const [range, setRange] = useStateA('1y');
  const [search, setSearch] = useStateA('');
  const [sort, setSort] = useStateA('avg'); // avg | name | active | trend | peak
  const [sortDir, setSortDir] = useStateA('desc');

  useEffectA(() => { setData(window.__DATA__); }, []);

  // All hooks must run on every render (before any early return) to keep hook order stable
  const startIdx = data ? window.rangeStartIdx(data.dates, range) : 0;
  const dates = data ? data.dates.slice(startIdx) : [];
  const teamVals = data ? data.total.slice(startIdx) : [];
  const filteredUsers = data ? data.users.filter(u => u.toLowerCase().includes(search.toLowerCase())) : [];
  const teamStats = window.stats(teamVals.map(window.cleanVal));

  const userStats = useMemoA(() => {
    if (!data) return {};
    const out = {};
    for (const u of data.users) {
      const vals = data.series[u].slice(startIdx).map(window.cleanVal);
      const s = window.stats(vals);
      const n = vals.length;
      let trend = null;
      if (n >= 60) {
        const r = vals.slice(n-30).filter(v=>v!==null && v>0);
        const p = vals.slice(n-60, n-30).filter(v=>v!==null && v>0);
        if (r.length && p.length) trend = (r.reduce((a,b)=>a+b,0)/r.length) - (p.reduce((a,b)=>a+b,0)/p.length);
      }
      out[u] = { ...s, trend, activeRate: s.total ? (s.active/s.total)*100 : 0 };
    }
    return out;
  }, [data, range, startIdx]);

  const sortedUsers = useMemoA(() => {
    if (!data) return [];
    const list = filteredUsers.slice();
    list.sort((a,b) => {
      let av, bv;
      switch(sort){
        case 'name': av = a; bv = b; break;
        case 'active': av = userStats[a].activeRate; bv = userStats[b].activeRate; break;
        case 'trend': av = userStats[a].trend ?? -999; bv = userStats[b].trend ?? -999; break;
        case 'peak': av = userStats[a].max; bv = userStats[b].max; break;
        default: av = userStats[a].nonZeroMean; bv = userStats[b].nonZeroMean;
      }
      if (typeof av === 'string') return sortDir==='asc' ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortDir==='asc' ? av - bv : bv - av;
    });
    return list;
  }, [data, filteredUsers, userStats, sort, sortDir]);

  const sortedByActive = useMemoA(() => {
    if (!data) return [];
    return [...data.users].sort((a,b)=> userStats[b].activeRate - userStats[a].activeRate);
  }, [data, userStats]);

  const teamTrend = useMemoA(() => {
    const n = teamVals.length;
    if (n < 60) return null;
    const r = teamVals.slice(n-30).map(window.cleanVal).filter(v=>v!==null && v>0);
    const p = teamVals.slice(n-60, n-30).map(window.cleanVal).filter(v=>v!==null && v>0);
    if (!r.length || !p.length) return null;
    return (r.reduce((a,b)=>a+b,0)/r.length) - (p.reduce((a,b)=>a+b,0)/p.length);
  }, [teamVals]);

  const teamSpark = useMemoA(() => {
    const smoothed = window.rollingAvg(teamVals.map(window.cleanVal), 14);
    return window.sparkPath(smoothed, 200, 60, 100);
  }, [teamVals]);
  const teamSparkArea = useMemoA(() => {
    const smoothed = window.rollingAvg(teamVals.map(window.cleanVal), 14);
    return window.areaPath(smoothed, 200, 60, 100);
  }, [teamVals]);

  if (!data) return <div className="loading"><div className="loading-spinner"/></div>;

  // Detail view
  if (view === 'detail' && selected) {
    return (
      <div className="app">
        <Topbar view={view} setView={setView} search={search} setSearch={setSearch} showViewToggle={false}/>
        <window.PersonDetail data={data} name={selected} onBack={() => { setView('overview'); setSelected(null); }}/>
      </div>
    );
  }

  const handleOpen = (name) => { setSelected(name); setView('detail'); };

  return (
    <div className="app">
      <Topbar view={view} setView={setView} search={search} setSearch={setSearch}/>

      <div className="page-head">
        <div>
          <h1>Team OEE</h1>
          <div className="sub">Overall Equipment Effectiveness · {data.users.length} operators · {window.fmtDate(data.meta.startDate)} → {window.fmtDate(data.meta.endDate)}</div>
        </div>
        <div className="seg">
          {['1m','3m','6m','1y','all'].map(r => (
            <button key={r} className={range===r ? 'active' : ''} onClick={()=>setRange(r)}>{r.toUpperCase()}</button>
          ))}
        </div>
      </div>

      <div className="kpis">
        <div className="kpi">
          <div className="kpi-label">Team Avg OEE</div>
          <div className="kpi-value">{window.fmt(teamStats.nonZeroMean, 1)}<span className="unit">%</span></div>
          <div className="kpi-foot">
            {teamTrend !== null && (
              <span className={teamTrend>=0 ? 'delta-up' : 'delta-down'}>
                {teamTrend>=0 ? '▲' : '▼'} {window.fmt(Math.abs(teamTrend),1)}
              </span>
            )}
            <span style={{color:'var(--text-faint)'}}>vs prior 30d</span>
          </div>
          <svg className="kpi-spark" viewBox="0 0 200 60" preserveAspectRatio="none">
            <defs>
              <linearGradient id="kpiGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.4"/>
                <stop offset="100%" stopColor="var(--accent)" stopOpacity="0"/>
              </linearGradient>
            </defs>
            <path d={teamSparkArea} fill="url(#kpiGrad)"/>
            <path d={teamSpark} fill="none" stroke="var(--accent)" strokeWidth="1.5"/>
          </svg>
        </div>
        <div className="kpi">
          <div className="kpi-label">Top Performer</div>
          <div className="kpi-value" style={{fontSize: 22}}>{sortedUsers[0] || '—'}</div>
          <div className="kpi-foot">
            <span className="mono" style={{color:'var(--accent)'}}>{window.fmt(userStats[sortedUsers[0]]?.nonZeroMean, 1)}%</span>
            <span style={{color:'var(--text-faint)'}}>active-day avg</span>
          </div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Most Consistent</div>
          <div className="kpi-value" style={{fontSize: 22}}>{sortedByActive[0] || '—'}</div>
          <div className="kpi-foot">
            <span className="mono" style={{color:'var(--accent)'}}>{window.fmt(userStats[sortedByActive[0]]?.activeRate, 0)}%</span>
            <span style={{color:'var(--text-faint)'}}>activity rate</span>
          </div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Window peak</div>
          <div className="kpi-value">{window.fmt(teamStats.max, 1)}<span className="unit">%</span></div>
          <div className="kpi-foot">
            <span style={{color:'var(--text-faint)'}}>single-day high</span>
          </div>
        </div>
      </div>

      <div className="section-head">
        <h2>Operators · {sortedUsers.length}</h2>
        <div className="section-tools">
          <span style={{fontSize:11, color:'var(--text-faint)', textTransform:'uppercase', letterSpacing:'0.08em'}}>Sort</span>
          <div className="seg">
            {[
              {k:'avg', l:'Avg OEE'},
              {k:'active', l:'Activity'},
              {k:'trend', l:'Trend'},
              {k:'peak', l:'Peak'},
              {k:'name', l:'Name'},
            ].map(o => (
              <button key={o.k} className={sort===o.k ? 'active' : ''} onClick={()=>{
                if (sort===o.k) setSortDir(sortDir==='asc' ? 'desc' : 'asc');
                else { setSort(o.k); setSortDir(o.k==='name' ? 'asc' : 'desc'); }
              }}>{o.l} {sort===o.k && (sortDir==='asc' ? '↑' : '↓')}</button>
            ))}
          </div>
        </div>
      </div>

      {view === 'overview' && (
        <div className="grid">
          {sortedUsers.map((u, i) => (
            <window.PersonCard key={u} name={u} dates={data.dates} values={data.series[u]}
              totalSeries={data.total} rank={i+1} onOpen={handleOpen} range={range}/>
          ))}
        </div>
      )}

      {view === 'list' && (
        <div className="list">
          <table className="list-table">
            <thead>
              <tr>
                <th onClick={()=>setSort('name')}>Operator</th>
                <th onClick={()=>setSort('avg')} style={{textAlign:'right'}}>Avg OEE</th>
                <th onClick={()=>setSort('active')} style={{textAlign:'right'}}>Active</th>
                <th onClick={()=>setSort('peak')} style={{textAlign:'right'}}>Peak</th>
                <th onClick={()=>setSort('trend')} style={{textAlign:'right'}}>30d Trend</th>
                <th style={{textAlign:'right', width: 200}}>Trajectory</th>
              </tr>
            </thead>
            <tbody>
              {sortedUsers.map((u, i) => {
                const s = userStats[u];
                const sm = window.rollingAvg(data.series[u].slice(startIdx).map(window.cleanVal), 14);
                const path = window.sparkPath(sm, 180, 24, 100);
                return (
                  <tr key={u} onClick={()=>handleOpen(u)}>
                    <td>
                      <div style={{display:'flex', alignItems:'center', gap:10}}>
                        <div className="avatar" style={{width:24, height:24, fontSize:9}}>{window.initials(u)}</div>
                        <span style={{fontWeight:500}}>{u}</span>
                      </div>
                    </td>
                    <td className="tnum" style={{textAlign:'right'}}>{window.fmt(s.nonZeroMean,1)}%</td>
                    <td className="tnum" style={{textAlign:'right', color:'var(--text-dim)'}}>{window.fmt(s.activeRate,0)}%</td>
                    <td className="tnum" style={{textAlign:'right', color:'var(--text-dim)'}}>{window.fmt(s.max,1)}</td>
                    <td className="tnum" style={{textAlign:'right', color: s.trend===null ? 'var(--text-faint)' : (s.trend>=0 ? 'var(--accent)' : 'var(--bad)')}}>
                      {s.trend===null ? '—' : `${s.trend>=0?'+':''}${window.fmt(s.trend,1)}`}
                    </td>
                    <td style={{textAlign:'right'}}>
                      <svg width="180" height="24" style={{display:'inline-block', verticalAlign:'middle'}}>
                        <path d={path} fill="none" stroke="var(--accent)" strokeWidth="1.25"/>
                      </svg>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function Topbar({ view, setView, search, setSearch, showViewToggle=true }){
  return (
    <div className="topbar">
      <div className="brand">
        <div className="brand-mark">OEE</div>
        <span>Production Atlas</span>
        <span className="brand-sub">Operator performance · live</span>
      </div>
      <div className="topbar-spacer"/>
      <div className="search">
        <svg className="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search operators…"/>
      </div>
      {showViewToggle && (
        <div className="seg">
          <button className={view==='overview' ? 'active' : ''} onClick={()=>setView('overview')}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{verticalAlign:'-2px', marginRight:4}}>
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
            Grid
          </button>
          <button className={view==='list' ? 'active' : ''} onClick={()=>setView('list')}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{verticalAlign:'-2px', marginRight:4}}>
              <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            List
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
